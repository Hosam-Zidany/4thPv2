<!DOCTYPE html>
<html>
<head>
    <title>DDXPlus Full Model Tester</title>
    <style>
        body { font-family: Arial; margin: 40px; }
        input, select { margin: 8px 0; padding: 8px; width: 320px; }
        button { padding: 12px 20px; font-size: 16px; }
        .evidence-wrap { margin-top: 12px; max-width: 640px; }
        .evidence-search { width: 520px; }
        .evidence-list { border: 1px solid #ccc; max-height: 240px; overflow: auto; padding: 6px; }
        .evidence-item { display: flex; align-items: center; gap: 8px; padding: 4px 2px; }
        .selected { margin-top: 10px; font-size: 14px; }
        .selected span { display: inline-block; padding: 4px 8px; margin: 4px; background: #eef; border-radius: 4px; }
        .selected button { margin-left: 6px; padding: 2px 6px; font-size: 12px; }
    </style>
</head>
<body>
    <h1>DDXPlus - Full Model Tester</h1>
    
    <label>Age:</label><br>
    <input type="number" id="age" value="45"><br>
    
    <label>Sex:</label><br>
    <select id="sex">
        <option value="M">Male</option>
        <option value="F">Female</option>
    </select><br>
    
    <label>Initial Evidence:</label><br>
    <input type="text" id="initial" list="initial-list" placeholder="Search evidence">
    <datalist id="initial-list"></datalist>
    
    <label>Select Symptoms/Evidences:</label><br>
    <div class="evidence-wrap">
        <input type="text" id="evidence-search" class="evidence-search" placeholder="Search evidences">
        <div id="evidence-list" class="evidence-list"></div>
        <div class="selected" id="selected-evidences"></div>
    </div>
    
    <button onclick="predict()">Predict Diagnosis</button>
    
    <div id="result" style="margin-top:20px; font-size:18px;"></div>

    <script>
        let evidenceItems = [];
        let selected = new Set();

        async function loadEvidences() {
            const res = await fetch('/evidences');
            evidenceItems = await res.json();

            const initialList = document.getElementById('initial-list');
            evidenceItems.forEach(item => {
                const option = document.createElement('option');
                option.value = item.code;
                option.textContent = `${item.code} - ${item.label}`;
                initialList.appendChild(option);
            });

            renderEvidenceList('');
        }

        function renderEvidenceList(filter) {
            const list = document.getElementById('evidence-list');
            list.innerHTML = '';
            const q = filter.trim().toLowerCase();
            const items = evidenceItems.filter(item => {
                if (!q) return true;
                return item.code.toLowerCase().includes(q) || item.label.toLowerCase().includes(q);
            }).slice(0, 200);

            items.forEach(item => {
                const row = document.createElement('label');
                row.className = 'evidence-item';
                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.checked = selected.has(item.code);
                checkbox.addEventListener('change', () => {
                    if (checkbox.checked) {
                        selected.add(item.code);
                    } else {
                        selected.delete(item.code);
                    }
                    renderSelected();
                });
                const text = document.createElement('span');
                text.textContent = `${item.code} - ${item.label}`;
                row.appendChild(checkbox);
                row.appendChild(text);
                list.appendChild(row);
            });
        }

        function renderSelected() {
            const wrap = document.getElementById('selected-evidences');
            wrap.innerHTML = '';
            const codes = Array.from(selected);
            codes.forEach(code => {
                const item = evidenceItems.find(e => e.code === code);
                const pill = document.createElement('span');
                pill.textContent = item ? `${item.code}` : code;
                const btn = document.createElement('button');
                btn.textContent = 'x';
                btn.onclick = () => {
                    selected.delete(code);
                    renderEvidenceList(document.getElementById('evidence-search').value);
                    renderSelected();
                };
                pill.appendChild(btn);
                wrap.appendChild(pill);
            });
        }

        document.getElementById('evidence-search').addEventListener('input', (e) => {
            renderEvidenceList(e.target.value);
        });

        loadEvidences();

        async function predict() {
            const data = {
                age: document.getElementById('age').value,
                sex: document.getElementById('sex').value,
                initial_evidence: document.getElementById('initial').value,
                evidences: Array.from(selected)
            };
            
            const res = await fetch('/predict', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            
            const json = await res.json();
            
            let html = `<b>Predicted: ${json.predicted_pathology}</b><br><br>Top 5:<br>`;
            json.top_5.forEach(item => {
                html += `${item.pathology} → ${(item.probability*100).toFixed(2)}%<br>`;
            });
            document.getElementById('result').innerHTML = html;
        }
    </script>
</body>
</html>
